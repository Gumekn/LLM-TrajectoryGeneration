# 项目配置文件

# 数据路径
data:
  raw_dir: "data/raw/waymo-open"
  processed_dir: "data/processed"
  visualization_dir: "data/visualizations"

# 处理参数
processing:
  risk_threshold: 0.5
  time_window: 5.0  # 秒
  sample_rate: 10   # Hz

# LLM配置
llm:
  model: "gpt-4"
  temperature: 0.7
  max_tokens: 2048

# 可视化配置
visualization:
  fps: 10
  resolution: [1280, 720]
  show_risk_score: true
